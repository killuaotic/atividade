<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <title>Contato — Lumière</title>
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="produtos.html">Produtos</a></li>
      <li><a href="sobrenos.html">Sobre nós</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
  </nav>

  <main style="max-width:1100px;margin:100px auto 48px;padding:0 16px;">
    <header style="margin-bottom:18px;">
      <h1 style="margin:0;font-family:'Marcellus SC', serif;">Fale conosco</h1>
      <p style="margin:6px 0 0;color:var(--primary-color);">Dúvidas, sugestões ou pedidos — envie uma mensagem abaixo.</p>
    </header>
    <section aria-label="Formulário de contato" style="background:#fff;border-radius:12px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,0.04);">
      <form action="#" method="post" novalidate>
        <div style="display:grid;gap:12px;">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" required style="padding:10px;border-radius:8px;border:1px solid #ddd;" />

          <label for="email">E‑mail</label>
          <input id="email" name="email" type="email" required style="padding:10px;border-radius:8px;border:1px solid #ddd;" />

          <label for="assunto">Assunto</label>
          <input id="assunto" name="assunto" type="text" style="padding:10px;border-radius:8px;border:1px solid #ddd;" />

          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" rows="6" required style="padding:10px;border-radius:8px;border:1px solid #ddd;resize:vertical;"></textarea>

          <div style="display:flex;gap:8px;justify-content:flex-start;margin-top:6px;">
            <button type="submit" class="btn">Enviar</button>
            <a href="index.html" class="btn secondary" style="display:inline-flex;align-items:center;padding:10px 12px;border-radius:8px;text-decoration:none;">Voltar</a>
          </div>
        </div>
      </form>

      <div style="margin-top:16px;color:var(--primary-color);font-size:0.95rem;">
        <p style="margin:0;"><strong>Telefone:</strong> (11) 9324-9892</p>
        <p style="margin:6px 0 0;"><strong>E‑mail:</strong> contato@lumiere.exemplo</p>
        <p style="margin:6px 0 0;">Endereço e outras formas de contato podem ser adicionados aqui.</p>
      </div>
    </section>
  </main>
  </body>
</html>
