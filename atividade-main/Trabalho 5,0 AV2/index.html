<html lang="en">
<head>

    <title>Loja de roupas femininas, Lumière</title>
</head>
<body>
<nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="sobrenos.html">Sobre nós</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

<main class="layout hero">
        <div class="left">
            <h1>Lumière</h1>
            <p class="paragrafo">Bem-vindo à Lumière, a sua loja de roupas femininas! Aqui você encontrará as últimas tendências da moda, peças elegantes e confortáveis para todas as ocasiões.</p>
            <div class="hero-buttons">
              <a href="produtos.html" class="btn">Ver produtos</a>
              <a href="contato.html" class="btn secondary">Contato</a>
            </div>
        </div>
        <aside class="right">
                <img class="lua" src="https://images.pexels.com/photos/19327673/pexels-photo-19327673.jpeg" alt="Modelo feminina com roupa elegante">
        </aside>
    </main>

<section class="carousel" aria-label="Carrossel de roupas">

    <input type="radio" name="slides" id="s1" checked>
    <input type="radio" name="slides" id="s2">
    <input type="radio" name="slides" id="s3">
    <input type="radio" name="slides" id="s4">

    <div class="carousel-viewport">
        <div class="slides">
            <div class="slide"><img src="https://images.pexels.com/photos/36772528/pexels-photo-36772528.jpeg" alt="Roupa 1"></div>
            <div class="slide"><img src="https://images.pexels.com/photos/32498751/pexels-photo-32498751.jpeg" alt="Roupa 2"></div>
            <div class="slide"><img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?w=900&q=80&auto=format&fit=crop" alt="Roupa 3"></div>
            <div class="slide"><img src="https://images.pexels.com/photos/4062841/pexels-photo-4062841.jpeg" alt="Roupa 4"></div>
        </div>
    </div>

    <label class="nav prev prev-1" for="s4" aria-hidden="true" aria-label="Anterior">‹</label>
    <label class="nav next next-1" for="s2" aria-hidden="true" aria-label="Próximo">›</label>

    <label class="nav prev prev-2" for="s1" aria-hidden="true" aria-label="Anterior">‹</label>
    <label class="nav next next-2" for="s3" aria-hidden="true" aria-label="Próximo">›</label>

    <label class="nav prev prev-3" for="s2" aria-hidden="true" aria-label="Anterior">‹</label>
    <label class="nav next next-3" for="s4" aria-hidden="true" aria-label="Próximo">›</label>

    <label class="nav prev prev-4" for="s3" aria-hidden="true" aria-label="Anterior">‹</label>
    <label class="nav next next-4" for="s1" aria-hidden="true" aria-label="Próximo">›</label>

    <div class="dots" role="tablist">
        <label for="s1" class="dot" aria-label="Slide 1"></label>
        <label for="s2" class="dot" aria-label="Slide 2"></label>
        <label for="s3" class="dot" aria-label="Slide 3"></label>
        <label for="s4" class="dot" aria-label="Slide 4"></label>
    </div>
</section>


</body>
</html>
